name: ci
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check-minimal-versions:
    name: Check build using minimal versions
    strategy:
      matrix:
        os:
          - ubuntu-22.04
        toolchain:
          - "1.89"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install nightly
      - run: cargo +nightly generate-lockfile -Z minimal-versions
      - run: cargo build --all-features

  clippy:
    name: Cargo clippy
    strategy:
      matrix:
        os:
          - macOS-latest
          - ubuntu-22.04
          - windows-2022
        toolchain:
          - "1.89"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          components: clippy
          toolchain: ${{ matrix.toolchain }}
      - run: cargo clippy -- -D warnings
    timeout-minutes: 20

  deny:
    name: Cargo deny
    strategy:
      matrix:
        os:
          - ubuntu-24.04
        toolchain:
          - "1.89"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo install cargo-deny
      - run: cargo deny check
    timeout-minutes: 20

  test-mac:
    name: Cargo test on Mac
    # docker on mac requires api version 1.44 or newer; this client uses v1.41, and v1.44 has breaking changes
    if: false
    strategy:
      matrix:
        os:
          - macos-15-intel
        toolchain:
          - "1.89"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: brew install docker
      - run: brew install colima
      - run: colima start
      - run: docker version
      - run: docker info
      - run: echo "DOCKER_HOST=$HOME/.colima/docker.sock" >> "$GITHUB_ENV"
      - run: cargo test --no-run
      - run: cargo test --no-fail-fast
    timeout-minutes: 20

  test-nix:
    name: Cargo test on nix
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
        toolchain:
          - "1.89"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          components: clippy
          toolchain: ${{ matrix.toolchain }}
      - run: docker version
      - run: cargo test --no-run
      - run: cargo test --no-fail-fast
    timeout-minutes: 30

  test-windows:
    name: Cargo test on Windows
    # docker on windows requires api version 1.44 or newer; this client uses v1.41, and v1.44 has breaking changes
    if: false
    strategy:
      matrix:
        os:
          - windows-2022
        toolchain:
          - "1.89"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      # See https://docs.rs/crate/openssl-sys/0.9.36
      - run: vcpkg install openssl:x64-windows-static-md
      - run: vcpkg integrate install
      - run: Get-Command docker
      - run: Get-Service docker
      - run: sc.exe query docker
      - run: Stop-Service docker
      - run: |
          Set-Content -Path "C:\ProgramData\Docker\config\daemon.json" -Value "{`"hosts`": [`"tcp://127.0.0.1:2375`"]}"
      - run: Start-Service docker
      - run: docker version
      - run: cargo test --no-run
      - run: |
          $env:DOCKER_HOST = 'http://localhost:2375'; cargo test --no-fail-fast
    timeout-minutes: 45
